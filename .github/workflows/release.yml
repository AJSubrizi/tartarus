name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.7.1)"
        required: true
        default: "v0.7.1"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: mac-arm64
            eb_args: --mac dir --arm64
          - os: macos-13
            platform: mac-x64
            eb_args: --mac dir --x64
          - os: ubuntu-latest
            platform: linux
            eb_args: --linux AppImage deb --x64
          - os: windows-latest
            platform: win
            eb_args: --win nsis portable --x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Smoke
        run: pnpm smoke

      - name: Package Electron
        run: pnpm exec electron-builder ${{ matrix.eb_args }} --publish never
        env:
          # unsigned builds for OSS
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Zip macOS .app
        if: startsWith(matrix.platform, 'mac')
        shell: bash
        run: |
          set -euo pipefail
          cd release
          if [ -d mac-arm64/Tartarus.app ]; then
            ditto -c -k --sequesterRsrc --keepParent mac-arm64/Tartarus.app Tartarus-mac-arm64.zip
          fi
          if [ -d mac/Tartarus.app ]; then
            ditto -c -k --sequesterRsrc --keepParent mac/Tartarus.app Tartarus-mac-x64.zip
          fi
          ls -la

      - name: Rename Windows artifacts
        if: matrix.platform == 'win'
        shell: bash
        run: |
          set -euo pipefail
          cd release
          shopt -s nullglob
          for f in *.exe; do
            case "$f" in
              *Setup*|*setup*) mv -f "$f" Tartarus-win-x64-Setup.exe ;;
              *) mv -f "$f" Tartarus-win-x64-portable.exe ;;
            esac
          done
          ls -la

      - name: Rename Linux artifacts
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          cd release
          shopt -s nullglob
          for f in *.AppImage; do mv -f "$f" Tartarus-linux-x64.AppImage; done
          for f in *.deb; do mv -f "$f" Tartarus-linux-x64.deb; done
          ls -la

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tartarus-${{ matrix.platform }}
          path: |
            release/Tartarus-*.zip
            release/Tartarus-*.exe
            release/Tartarus-*.AppImage
            release/Tartarus-*.deb
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/*.deb
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        run: |
          set -euo pipefail
          mkdir -p out
          find artifacts -type f \( \
            -name 'Tartarus-*.zip' -o \
            -name 'Tartarus-*.exe' -o \
            -name 'Tartarus-*.AppImage' -o \
            -name 'Tartarus-*.deb' -o \
            -name '*.zip' -o \
            -name '*.exe' -o \
            -name '*.AppImage' -o \
            -name '*.deb' \
          \) -print -exec cp -f {} out/ \;
          echo "=== out ==="
          ls -lah out || true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: Tartarus ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: out/*
          fail_on_unmatched_files: false
          body: |
            ## Tartarus ${{ github.event.inputs.tag || github.ref_name }}

            **The harness for the harnesses.**

            ### Desktop apps

            | Platform | File |
            |----------|------|
            | **macOS Apple Silicon** | `Tartarus-mac-arm64.zip` |
            | **macOS Intel** | `Tartarus-mac-x64.zip` |
            | **Windows** | `Tartarus-win-x64-Setup.exe` or portable `.exe` |
            | **Linux** | `Tartarus-linux-x64.AppImage` / `.deb` |

            Unzip/open the app → connect your CLIs → **Installa MCP** on Claude / Codex / Cursor.

            ### MCP (CLI, any host)
            ```bash
            codex mcp add tartarus -- npx -y github:AJSubrizi/tartarus mcp
            ```

            ### Context pack
            `run` / `fanout` accept structured `context` (goal, constraints, files, handoff).
            Brief → `.tartarus/brief-<job>.md` in the worker workspace.

            Builds are **unsigned** — macOS may need right-click → Open; Windows SmartScreen may warn.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
