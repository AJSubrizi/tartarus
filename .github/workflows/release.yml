name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.8.0)"
        required: true
        default: "v0.8.0"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: mac-arm64
            eb_args: --mac zip --arm64
          - os: macos-14
            platform: mac-x64
            eb_args: --mac zip --x64
          - os: ubuntu-latest
            platform: linux
            eb_args: --linux AppImage deb --x64
          - os: windows-latest
            platform: win
            eb_args: --win nsis portable --x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Smoke
        run: pnpm smoke

      - name: Package Electron
        shell: bash
        run: |
          set -euo pipefail
          # Never export empty CSC_LINK — electron-builder treats "" as a cert path and fails.
          export CSC_IDENTITY_AUTO_DISCOVERY=false
          if [[ -n "${CSC_LINK_SECRET:-}" ]]; then
            export CSC_LINK="$CSC_LINK_SECRET"
            export CSC_KEY_PASSWORD="${CSC_KEY_PASSWORD_SECRET:-}"
            export CSC_IDENTITY_AUTO_DISCOVERY=true
          fi
          if [[ -n "${WIN_CSC_LINK_SECRET:-}" ]]; then
            export WIN_CSC_LINK="$WIN_CSC_LINK_SECRET"
            export WIN_CSC_KEY_PASSWORD="${WIN_CSC_KEY_PASSWORD_SECRET:-}"
          fi
          if [[ -n "${APPLE_ID_SECRET:-}" ]]; then
            export APPLE_ID="$APPLE_ID_SECRET"
            export APPLE_APP_SPECIFIC_PASSWORD="${APPLE_APP_SPECIFIC_PASSWORD_SECRET:-}"
            export APPLE_TEAM_ID="${APPLE_TEAM_ID_SECRET:-}"
          fi
          pnpm exec electron-builder ${{ matrix.eb_args }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK_SECRET: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD_SECRET: ${{ secrets.CSC_KEY_PASSWORD }}
          WIN_CSC_LINK_SECRET: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD_SECRET: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          APPLE_ID_SECRET: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD_SECRET: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID_SECRET: ${{ secrets.APPLE_TEAM_ID }}

      - name: Normalize macOS zip names
        if: startsWith(matrix.platform, 'mac')
        shell: bash
        run: |
          set -euo pipefail
          cd release
          shopt -s nullglob
          # electron-builder zip names vary; normalize for install.sh + README
          for f in *.zip; do
            case "$f" in
              *arm64*|*-arm64*) mv -f "$f" Tartarus-mac-arm64.zip 2>/dev/null || true ;;
              *x64*|*-x64*|*intel*) mv -f "$f" Tartarus-mac-x64.zip 2>/dev/null || true ;;
            esac
          done
          # Also keep any already-correct names
          ls -la

      - name: Rename Windows artifacts
        if: matrix.platform == 'win'
        shell: bash
        run: |
          set -euo pipefail
          cd release
          shopt -s nullglob
          for f in *.exe; do
            case "$f" in
              *Setup*|*setup*) mv -f "$f" Tartarus-win-x64-Setup.exe ;;
              *portable*|*Portable*) mv -f "$f" Tartarus-win-x64-portable.exe ;;
              *)
                # first leftover → portable-ish
                if [[ ! -f Tartarus-win-x64-portable.exe ]]; then
                  mv -f "$f" Tartarus-win-x64-portable.exe
                fi
                ;;
            esac
          done
          ls -la

      - name: Rename Linux artifacts
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          cd release
          shopt -s nullglob
          for f in *.AppImage; do mv -f "$f" Tartarus-linux-x64.AppImage; done
          for f in *.deb; do mv -f "$f" Tartarus-linux-x64.deb; done
          ls -la

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tartarus-${{ matrix.platform }}
          path: |
            release/Tartarus-*.zip
            release/Tartarus-*.exe
            release/Tartarus-*.AppImage
            release/Tartarus-*.deb
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/*.deb
            release/*.yml
            release/*.yaml
            release/*.blockmap
          if-no-files-found: warn

  release:
    needs: build
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        run: |
          set -euo pipefail
          mkdir -p out
          find artifacts -type f \( \
            -name 'Tartarus-*.zip' -o \
            -name 'Tartarus-*.exe' -o \
            -name 'Tartarus-*.AppImage' -o \
            -name 'Tartarus-*.deb' -o \
            -name '*.zip' -o \
            -name '*.exe' -o \
            -name '*.AppImage' -o \
            -name '*.deb' -o \
            -name 'latest*.yml' -o \
            -name 'latest*.yaml' -o \
            -name '*.blockmap' -o \
            -name '*.yml' \
          \) -print -exec cp -f {} out/ \;
          echo "=== out ==="
          ls -lah out || true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: Tartarus ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: out/*
          fail_on_unmatched_files: false
          body: |
            ## Tartarus ${{ github.event.inputs.tag || github.ref_name }}

            **The harness for the harnesses.**

            ### Desktop apps

            | Platform | File |
            |----------|------|
            | **macOS Apple Silicon** | `Tartarus-mac-arm64.zip` |
            | **macOS Intel** | `Tartarus-mac-x64.zip` |
            | **Windows** | `Tartarus-win-x64-Setup.exe` or portable `.exe` |
            | **Linux** | `Tartarus-linux-x64.AppImage` / `.deb` |

            Open app → **Installa MCP** on Claude / Codex / Cursor → job board watches spawns.

            ### MCP
            ```bash
            codex mcp add tartarus -- npx -y @ajsubrizi/tartarus mcp
            # or: npx -y github:AJSubrizi/tartarus mcp
            ```

            ### Signing
            Builds sign when repo secrets are set ([docs/SIGNING.md](https://github.com/AJSubrizi/tartarus/blob/main/docs/SIGNING.md)).
            Otherwise: macOS right-click → Open; Windows SmartScreen may warn.

            Auto-update checks GitHub Releases when running a packaged app.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
